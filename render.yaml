services:
  - type: web
    name: erp-fiscal-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: erp-fiscal-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://SEU-FRONTEND.vercel.app

databases:
  - name: erp-fiscal-db
    plan: free
